name: CI
on: push

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install modules
        run: npm ci

      - name: Debug test environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Test files found:"
          find test -name "*.test.*" | sort
          echo "Jest config:"
          cat jest.config.cjs

      - name: Prepare Jest cache
        run: npm run testCacheCreate
        continue-on-error: true

      - name: Run tests with verbose output
        run: npm test -- --verbose

      - run: npm run build --if-present

  puppeteer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Cache Puppeteer browser download
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('test/puppeteer/package-lock.json') }}

      - name: Install Puppeteer test dependencies
        run: npm ci
        working-directory: test/puppeteer

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run suspend-discard integration test
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac &
          sleep 1
          DISPLAY=:99 npx tsx suspend-discard.test.ts
        working-directory: test/puppeteer

      - name: Run corrupt-storage regression test
        run: DISPLAY=:99 npx tsx corrupt-storage.test.ts
        working-directory: test/puppeteer